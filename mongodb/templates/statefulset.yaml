
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongodb 
  namespace: roboshop 
spec:
  selector:
    matchLabels:
      app: mongodb 
      project: roboshop
      tier: db  # has to match .spec.template.metadata.labels
  serviceName: mongodb 
  replicas: {{ .Values.statefulset.replicas }} # by default is 1
  minReadySeconds: 10 # by default is 0
  template:
    metadata:
      labels:
        app: mongodb
        project: roboshop
        tier: db  # has to match .spec.selector.matchLabels
    spec:
      terminationGracePeriodSeconds: 10
      containers:
      - name: mongodb 
        image: "devopsprocloudaws/mongodb:{{ .Values.statefulset.imageVersion }}"
        volumeMounts:
        - name: mongodb
          mountPath: /data/db
  volumeClaimTemplates:
  - metadata:
      name: mongodb 
    spec:
      accessModes: [ "ReadWriteOnce" ]
      storageClassName: ebs-sc
      resources:
        requests:
          storage: 2Gi
