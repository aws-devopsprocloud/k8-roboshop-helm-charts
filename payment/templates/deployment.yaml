apiVersion: apps/v1 
kind: Deployment
metadata: 
  name: payment  # Deploymentset name 
  namespace: roboshop 
  labels: 
    app: payment  
    project: roboshop 
    tier: app  
spec: 
  replicas: {{ .Values.deployment.replicas }}
  selector:
    matchLabels: # replicaset labels 
      app: payment  
      project: roboshop 
      tier: app  

  template: # Pod definition 
    metadata:
      name: payment  # Pod name# ACTUAL POD NAME WILL BE DIFFERENT AFTER Kubectl apply
      labels:
        app: payment  
        project: roboshop 
        tier: app  
    spec: 
      containers:
      - name: payment   # container name 
        image: "devopsprocloudaws/payment:{{ .Values.deployment.imageVersion }}"
        ports: 
        - containerPort: 8080 
        envFrom:
        - configMapRef:
            name: payment  
        - secretRef:
            name: payment  
        resources:
          requests:
            cpu: "100m"
            memory: "64Mi"
          limits:
            cpu: "250m"
            memory: "128Mi"

 
