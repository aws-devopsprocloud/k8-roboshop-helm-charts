
apiVersion: v1 
kind: Service 
metadata: 
  name: catalogue
  namespace: roboshop 
spec: 
  selector: # selecting the Pod by using the same Pod labels 
    app: catalogue
    project: roboshop
    tier: app 
  ports:
  - protocol: TCP
    port: 8080 # service port 
    targetPort: 8080 # container port 