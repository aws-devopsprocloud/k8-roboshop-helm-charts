
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mysql 
  namespace: roboshop 
spec:
  selector:
    matchLabels:
      app: mysql 
      project: roboshop
      tier: db  # has to match .spec.template.metadata.labels
  serviceName: mysql 
  replicas: {{ .Values.statefulset.replicas }} # by default is 1
  minReadySeconds: 10 # by default is 0
  template:
    metadata:
      labels:
        app: mysql
        project: roboshop
        tier: db  # has to match .spec.selector.matchLabels
    spec:
      terminationGracePeriodSeconds: 10
      containers:
      - name: mysql 
        image: "devopsprocloudaws/mysql:{{ .Values.statefulset.imageVersion }}"
        envFrom:
        - secretRef: 
            name: mysql 
        volumeMounts:
        - name: mysql
          mountPath: /var/lib/mysql
  volumeClaimTemplates:
  - metadata:
      name: mysql 
    spec:
      accessModes: [ "ReadWriteOnce" ]
      storageClassName: ebs-sc
      resources:
        requests:
          storage: 1Gi
