apiVersion: apps/v1 
kind: Deployment
metadata: 
  name: shipping # Deploymentset name 
  namespace: roboshop 
  labels: 
    app: shipping 
    project: roboshop 
    tier: app  
spec: 
  replicas: {{ .Values.deployment.replicas }}
  selector:
    matchLabels: # replicaset labels 
      app: shipping 
      project: roboshop 
      tier: app  

  template: # Pod definition 
    metadata:
      name: shipping # Pod name# ACTUAL POD NAME WILL BE DIFFERENT AFTER Kubectl apply
      labels:
        app: shipping 
        project: roboshop 
        tier: app  
    spec: 
      containers:
      - name: shipping  # container name 
        image: "devopsprocloudaws/shipping:{{ .Values.deployment.imageVersion }}"
        ports: 
        - containerPort: 8080 
        envFrom:
        - configMapRef:
            name: shipping 
        resources:
          requests:
            cpu: "250m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "350Mi"

 
